<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班费记账本</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 20px;
        }

        header h1 {
            color: white;
            font-size: 1.8rem;
            margin-bottom: 15px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .share-section {
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 15px;
        }

        .share-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            color: #667eea;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .share-btn:hover {
            background: #f0f0f0;
        }

        .balance-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }

        .balance-label {
            display: block;
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .balance-amount {
            font-size: 2.5rem;
            font-weight: bold;
        }

        .balance-amount.positive {
            color: #10b981;
        }

        .balance-amount.negative {
            color: #ef4444;
        }

        /* Form Section */
        .form-section {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }

        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: #f3f4f6;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .transaction-form {
            display: none;
        }

        .transaction-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            color: #333;
            font-size: 0.9rem;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        /* File Upload */
        .file-upload {
            position: relative;
            border: 2px dashed #d1d5db;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .file-upload:hover {
            border-color: #667eea;
            background: #f9fafb;
        }

        .file-upload input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .upload-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: #6b7280;
        }

        .upload-icon {
            font-size: 2rem;
        }

        .preview-container {
            position: relative;
            display: inline-block;
        }

        .preview-container img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
        }

        .remove-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 24px;
            height: 24px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-expense {
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
        }

        .btn-expense:hover {
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.4);
        }

        /* Filter */
        .filter-section {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .filter-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: white;
            color: #667eea;
        }

        /* Records */
        .records-section {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }

        .records-section h2 {
            color: #333;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        .records-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .record-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: #f9fafb;
            border-radius: 12px;
            transition: transform 0.2s;
            flex-wrap: wrap;
        }

        .record-card:hover {
            transform: translateX(5px);
        }

        .record-icon {
            font-size: 1.8rem;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border-radius: 10px;
        }

        .record-info {
            flex: 1;
            min-width: 0;
        }

        .record-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 3px;
            word-break: break-word;
        }

        .record-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 0.8rem;
            color: #6b7280;
        }

        .record-note {
            background: #e5e7eb;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .record-amount {
            font-size: 1.1rem;
            font-weight: bold;
        }

        .record-amount.income {
            color: #10b981;
        }

        .record-amount.expense {
            color: #ef4444;
        }

        .record-image {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            flex-shrink: 0;
        }

        .record-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #6b7280;
        }

        .empty-state p {
            margin-bottom: 5px;
        }

        .empty-hint {
            font-size: 0.9rem;
        }

        /* Image Modal */
        .image-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
        }

        .modal-content img {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 8px;
        }

        .modal-close {
            position: absolute;
            top: -40px;
            right: 0;
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
        }

        /* QR Modal */
        .qr-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .qr-modal-content {
            background: white;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            max-width: 320px;
        }

        .qr-modal h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .qr-modal img {
            width: 200px;
            height: 200px;
        }

        .qr-modal p {
            margin-top: 15px;
            color: #666;
            font-size: 0.9rem;
        }

        .qr-close {
            margin-top: 15px;
            padding: 10px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            body {
                padding: 15px;
            }

            header h1 {
                font-size: 1.5rem;
            }

            .balance-amount {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>班费记账本</h1>
            <div class="share-section">
                <a href="#" class="share-btn" onclick="showQRCode(); return false;">
                    <span>分享给同学</span>
                    <span style="font-size: 1.2rem;">📱</span>
                </a>
            </div>
            <div class="balance-card">
                <span class="balance-label">当前余额</span>
                <span class="balance-amount positive" id="balance">¥0.00</span>
            </div>
        </header>

        <!-- 添加交易表单 -->
        <div class="form-section">
            <div class="tab-buttons">
                <button class="tab-btn active" data-tab="income">交班费</button>
                <button class="tab-btn" data-tab="expense">支出</button>
            </div>

            <!-- 收入表单 -->
            <form id="income-form" class="transaction-form active">
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" id="income-name" placeholder="谁交了班费" required>
                </div>
                <div class="form-group">
                    <label>金额 (¥)</label>
                    <input type="number" id="income-amount" placeholder="0.00" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <input type="text" id="income-note" placeholder="可选备注">
                </div>
                <div class="form-group">
                    <label>截图（可选）</label>
                    <div class="file-upload" id="income-upload">
                        <input type="file" id="income-image" accept="image/*">
                        <div class="upload-placeholder">
                            <span class="upload-icon">📷</span>
                            <span>点击上传截图</span>
                        </div>
                        <div class="preview-container" id="income-preview" style="display:none;">
                            <img id="income-preview-img" src="" alt="预览">
                            <button type="button" class="remove-btn" onclick="removeImage('income')">✕</button>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn-submit">记录收入</button>
            </form>

            <!-- 支出表单 -->
            <form id="expense-form" class="transaction-form">
                <div class="form-group">
                    <label>支出项目</label>
                    <input type="text" id="expense-title" placeholder="买了什么" required>
                </div>
                <div class="form-group">
                    <label>金额 (¥)</label>
                    <input type="number" id="expense-amount" placeholder="0.00" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label>日期</label>
                    <input type="date" id="expense-date" required>
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <input type="text" id="expense-note" placeholder="可选备注">
                </div>
                <div class="form-group">
                    <label>票据图片（可选）</label>
                    <div class="file-upload" id="expense-upload">
                        <input type="file" id="expense-image" accept="image/*">
                        <div class="upload-placeholder">
                            <span class="upload-icon">🧾</span>
                            <span>点击上传票据</span>
                        </div>
                        <div class="preview-container" id="expense-preview" style="display:none;">
                            <img id="expense-preview-img" src="" alt="预览">
                            <button type="button" class="remove-btn" onclick="removeImage('expense')">✕</button>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn-submit btn-expense">记录支出</button>
            </form>
        </div>

        <!-- 筛选器 -->
        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="income">收入</button>
            <button class="filter-btn" data-filter="expense">支出</button>
        </div>

        <!-- 交易记录列表 -->
        <div class="records-section">
            <h2>📋 收支记录</h2>
            <div id="records-list" class="records-list">
            </div>
            <div id="empty-state" class="empty-state">
                <p>暂无记录</p>
                <p class="empty-hint">开始记录你的第一笔收支吧！</p>
            </div>
        </div>

        <footer>
            <p>班费记账本 · 方便透明</p>
        </footer>
    </div>

    <script>
        const STORAGE_KEY = 'classFinanceRecords';

        // 页面加载时读取数据
        document.addEventListener('DOMContentLoaded', loadRecords);

        function loadRecords() {
            const records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            const recordsList = document.getElementById('records-list');
            const emptyState = document.getElementById('empty-state');

            recordsList.innerHTML = '';

            if (records.length === 0) {
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            let totalIncome = 0;
            let totalExpense = 0;

            records.forEach((record, index) => {
                if (record.type === 'income') {
                    totalIncome += parseFloat(record.amount);
                } else {
                    totalExpense += parseFloat(record.amount);
                }

                const card = createRecordCard(record, index);
                recordsList.appendChild(card);
            });

            const balance = totalIncome - totalExpense;
            document.getElementById('balance').textContent = `¥${balance.toFixed(2)}`;
            document.getElementById('balance').className = `balance-amount ${balance >= 0 ? 'positive' : 'negative'}`;
        }

        function createRecordCard(record, index) {
            const card = document.createElement('div');
            card.className = `record-card ${record.type}`;
            card.dataset.type = record.type;

            const date = record.date ? new Date(record.date).toLocaleDateString('zh-CN') : '无日期';
            const icon = record.type === 'income' ? '💰' : '💸';
            const amountPrefix = record.type === 'income' ? '+' : '-';

            card.innerHTML = `
                <div class="record-icon">${icon}</div>
                <div class="record-info">
                    <div class="record-title">${escapeHtml(record.name)}</div>
                    <div class="record-meta">
                        <span class="record-date">${date}</span>
                        ${record.note ? `<span class="record-note">${escapeHtml(record.note)}</span>` : ''}
                    </div>
                </div>
                <div class="record-amount ${record.type}">
                    ${amountPrefix}¥${parseFloat(record.amount).toFixed(2)}
                </div>
                ${record.imageUrl ? `
                    <div class="record-image" onclick="showImageModal('${record.imageUrl}')">
                        <img src="${record.imageUrl}" alt="附件图片">
                    </div>
                ` : ''}
            `;

            return card;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Tab切换
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.transaction-form').forEach(f => f.classList.remove('active'));
                btn.classList.add('active');
                const targetForm = btn.dataset.tab === 'income' ? 'income-form' : 'expense-form';
                document.getElementById(targetForm).classList.add('active');
            });
        });

        // 筛选
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const filter = btn.dataset.filter;
                document.querySelectorAll('.record-card').forEach(card => {
                    if (filter === 'all' || card.dataset.type === filter) {
                        card.style.display = 'flex';
                    } else {
                        card.style.display = 'none';
                    }
                });
            });
        });

        // 图片上传预览
        ['income', 'expense'].forEach(type => {
            const input = document.getElementById(`${type}-image`);
            const upload = document.getElementById(`${type}-upload`);
            const preview = document.getElementById(`${type}-preview`);
            const previewImg = document.getElementById(`${type}-preview-img`);
            const placeholder = upload.querySelector('.upload-placeholder');

            input.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        previewImg.src = e.target.result;
                        preview.style.display = 'block';
                        placeholder.style.display = 'none';
                    };
                    reader.readAsDataURL(file);
                }
            });
        });

        function removeImage(type) {
            document.getElementById(`${type}-image`).value = '';
            document.getElementById(`${type}-preview`).style.display = 'none';
            document.querySelector(`#${type}-upload .upload-placeholder`).style.display = 'flex';
        }

        // 提交收入
        document.getElementById('income-form').addEventListener('submit', (e) => {
            e.preventDefault();

            const name = document.getElementById('income-name').value;
            const amount = document.getElementById('income-amount').value;
            const note = document.getElementById('income-note').value;
            const imageFile = document.getElementById('income-image').files[0];

            handleImageFile(imageFile).then(imageUrl => {
                saveTransaction({
                    type: 'income',
                    name: name,
                    amount: amount,
                    note: note,
                    date: new Date().toISOString().split('T')[0],
                    imageUrl: imageUrl
                });

                e.target.reset();
                removeImage('income');
            });
        });

        // 提交支出
        document.getElementById('expense-form').addEventListener('submit', (e) => {
            e.preventDefault();

            const title = document.getElementById('expense-title').value;
            const amount = document.getElementById('expense-amount').value;
            const date = document.getElementById('expense-date').value;
            const note = document.getElementById('expense-note').value;
            const imageFile = document.getElementById('expense-image').files[0];

            handleImageFile(imageFile).then(imageUrl => {
                saveTransaction({
                    type: 'expense',
                    name: title,
                    amount: amount,
                    date: date,
                    note: note,
                    imageUrl: imageUrl
                });

                e.target.reset();
                removeImage('expense');
            });
        });

        async function handleImageFile(file) {
            if (!file) return null;

            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        function saveTransaction(data) {
            const records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            records.unshift({
                ...data,
                timestamp: Date.now()
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
            loadRecords();
            document.querySelector('.filter-btn[data-filter="all"]').click();
        }

        // 图片放大查看
        function showImageModal(url) {
            const modal = document.createElement('div');
            modal.className = 'image-modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <button class="modal-close" onclick="this.parentElement.parentElement.remove()">✕</button>
                    <img src="${url}" alt="大图">
                </div>
            `;
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.remove();
            });
            document.body.appendChild(modal);
        }

        // 显示二维码
        function showQRCode() {
            const pageUrl = window.location.href;
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(pageUrl)}`;

            const modal = document.createElement('div');
            modal.className = 'qr-modal';
            modal.innerHTML = `
                <div class="qr-modal-content">
                    <h3>分享给同学</h3>
                    <img src="${qrUrl}" alt="二维码">
                    <p>扫码查看班费收支记录</p>
                    <button class="qr-close" onclick="this.parentElement.parentElement.remove()">关闭</button>
                </div>
            `;
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.remove();
            });
            document.body.appendChild(modal);
        }

        // 设置默认日期为今天
        document.getElementById('expense-date').valueAsDate = new Date();
    </script>
</body>
</html>
